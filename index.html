<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terence 女朋友</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e5e5e2;
    --text: #1a1a18;
    --text-sub: #6b6b67;
    --text-hint: #a8a8a4;
    --accent: #6264a7;
    --accent-light: #ededf7;
    --accent-text: #4a4c8a;
    --warn: #d4860b;
    --warn-light: #fef3dc;
    --green: #1a7a1a;
    --green-light: #e6f5e6;
    --red: #c0392b;
    --red-light: #fdecea;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 0.5px rgba(0,0,0,0.06);
  }

  body {
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  /* Header */
  .header {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .logo {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }
  .header-text h1 { font-size: 17px; font-weight: 600; color: var(--text); }
  .header-text p { font-size: 12px; color: var(--text-sub); margin-top: 1px; }
  .badge {
    margin-left: auto; display: inline-flex; align-items: center; gap: 4px;
    background: var(--warn-light); color: var(--warn);
    font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px;
    border: 0.5px solid #f0c460;
  }

  /* Card */
  .card {
    width: 100%; max-width: 560px;
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }

  /* API Section */
  .api-section {
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--border);
    background: #fafaf9;
  }
  .api-label {
    font-size: 11px; color: var(--text-sub); margin-bottom: 7px;
    display: flex; align-items: center; gap: 5px;
  }
  .api-row { display: flex; gap: 6px; }
  .api-input {
    flex: 1; font-size: 13px; padding: 7px 10px;
    border: 0.5px solid var(--border); border-radius: 7px;
    background: var(--surface); color: var(--text);
    font-family: "Consolas", monospace;
    outline: none;
  }
  .api-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(98,100,167,0.12); }
  .btn-save {
    font-size: 12px; padding: 7px 14px;
    border: 0.5px solid var(--border); border-radius: 7px;
    background: var(--surface); color: var(--text);
    cursor: pointer; white-space: nowrap; font-weight: 500;
    transition: background 0.12s;
  }
  .btn-save:hover { background: var(--bg); }
  .btn-link {
    font-size: 12px; padding: 7px 12px;
    border: 0.5px solid var(--accent); border-radius: 7px;
    background: var(--accent-light); color: var(--accent-text);
    cursor: pointer; white-space: nowrap; text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    font-weight: 500;
  }
  .api-status {
    font-size: 11px; color: var(--text-hint); margin-top: 6px;
    min-height: 16px;
  }
  .api-status.ok { color: var(--green); }
  .api-status.err { color: var(--red); }

  /* Settings Row */
  .settings-row {
    display: flex; gap: 0;
    border-bottom: 0.5px solid var(--border);
  }
  .setting {
    flex: 1; padding: 9px 12px;
    border-right: 0.5px solid var(--border);
  }
  .setting:last-child { border-right: none; }
  .setting label { font-size: 10px; color: var(--text-hint); display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
  .setting select {
    width: 100%; font-size: 12px; border: none;
    background: transparent; color: var(--text); cursor: pointer; outline: none;
    font-family: inherit;
  }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-bottom: 0.5px solid var(--border);
    background: #fafaf9;
  }
  .btn-toggle {
    font-size: 11px; padding: 3px 9px; border-radius: 5px;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--text-sub); cursor: pointer;
  }
  .btn-toggle:hover { background: var(--bg); }
  .tts-wrap { display: flex; align-items: center; gap: 5px; margin-left: auto; }
  .tts-wrap label { font-size: 12px; color: var(--text-sub); cursor: pointer; }
  .tts-wrap input { cursor: pointer; accent-color: var(--accent); }
  .btn-clear {
    font-size: 11px; padding: 3px 9px; border-radius: 5px;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--text-sub); cursor: pointer;
  }
  .btn-clear:hover { background: var(--red-light); color: var(--red); border-color: #f0b4b0; }

  /* System Prompt */
  .sys-section { display: none; border-bottom: 0.5px solid var(--border); }
  .sys-section textarea {
    width: 100%; font-size: 12px; padding: 10px 14px;
    border: none; resize: none; height: 62px;
    background: var(--bg); color: var(--text);
    font-family: inherit; line-height: 1.6;
    outline: none;
  }

  /* Chat Box */
  .chat-box {
    height: 280px; overflow-y: auto;
    padding: 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .placeholder {
    text-align: center; color: var(--text-hint);
    font-size: 13px; margin: auto;
  }
  .placeholder svg { width: 32px; height: 32px; stroke: var(--text-hint); display: block; margin: 0 auto 8px; }
  .msg { display: flex; gap: 8px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-icon {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .msg.ai .msg-icon { background: var(--warn-light); }
  .msg.ai .msg-icon svg { width: 14px; height: 14px; stroke: var(--warn); }
  .msg.user .msg-icon { background: var(--accent-light); }
  .msg.user .msg-icon svg { width: 14px; height: 14px; stroke: var(--accent); }
  .msg-bubble {
    max-width: 78%; font-size: 13.5px; line-height: 1.6;
    padding: 9px 13px; border-radius: 12px;
  }
  .msg.ai .msg-bubble {
    background: var(--bg); color: var(--text);
    border: 0.5px solid var(--border); border-bottom-left-radius: 3px;
  }
  .msg.user .msg-bubble {
    background: var(--accent); color: #fff;
    border-bottom-right-radius: 3px;
  }

  /* Controls */
  .controls {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 12px; border-top: 0.5px solid var(--border);
  }
  .mic-btn {
    width: 46px; height: 46px; border-radius: 50%;
    border: 0.5px solid var(--border);
    background: var(--surface); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.12s, border-color 0.12s;
  }
  .mic-btn:hover { background: var(--bg); }
  .mic-btn.listening {
    background: var(--red-light); border-color: #f0b4b0;
    animation: pulse 1s infinite;
  }
  .mic-btn svg { width: 20px; height: 20px; stroke: var(--text-sub); fill: none; stroke-width: 2; stroke-linecap: round; }
  .mic-btn.listening svg { stroke: var(--red); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.15); }
    50% { box-shadow: 0 0 0 7px rgba(192,57,43,0); }
  }
  .text-row { flex: 1; display: flex; gap: 6px; }
  .text-input {
    flex: 1; font-size: 13px; padding: 9px 13px;
    border-radius: 22px; border: 0.5px solid var(--border);
    background: var(--bg); color: var(--text);
    outline: none; font-family: inherit;
    transition: border-color 0.12s;
  }
  .text-input:focus { border-color: var(--accent); background: var(--surface); }
  .send-btn {
    padding: 9px 16px; border-radius: 22px;
    background: var(--accent); color: #fff;
    border: none; font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    font-family: inherit; transition: opacity 0.12s;
  }
  .send-btn:hover { opacity: 0.88; }

  /* Status */
  .status-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; background: #fafaf9;
    border-top: 0.5px solid var(--border);
    font-size: 11px; color: var(--text-hint);
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .dot.green { background: var(--green); }
  .dot.red { background: var(--red); }
  .dot.amber { background: var(--warn); animation: blink .8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* STT Warning */
  .stt-warn {
    display: none; margin-top: 8px; max-width: 560px; width: 100%;
    background: var(--warn-light); border: 0.5px solid #f0c460;
    border-radius: 7px; padding: 8px 12px;
    font-size: 12px; color: var(--warn);
  }

  /* Footer */
  .footer {
    margin-top: 14px; font-size: 11px; color: var(--text-hint);
    text-align: center; max-width: 560px;
  }
  .footer a { color: var(--accent-text); text-decoration: none; }

  @media (max-width: 480px) {
    body { padding: 12px 10px 30px; }
    .chat-box { height: 220px; }
    .setting { padding: 8px 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  </div>
  <div class="header-text">
    <h1>AI 女朋友</h1>
    <p> 語音 + 文字對話 · 中英雙語</p>
  </div>
  <span class="badge">⚡ Groq 免費</span>
</div>

<div class="card">

  <!-- API Key -->
  <div class="api-section" id="apiSection" style="display:none">
    <div class="api-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      Groq  
    </div>
    <div class="api-row">
      <input type="password" class="api-input" id="apiKey" placeholder="gsk_..." autocomplete="off">
      <button class="btn-save" onclick="saveKey()">儲存</button>
      <a class="btn-link" href="https://console.groq.com/keys" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        免費取得 Key
      </a>
    </div>
    <div class="api-status" id="apiStatus">免費）</div>
  </div>

  <!-- Settings -->
  <div class="settings-row">
    <div class="setting">
      <label>辨識語言</label>
      <select id="sttLang">
        <option value="zh-TW">中文（繁體）</option>
        <option value="en-US">English</option>
      </select>
    </div>
    <div class="setting">
      <label>AI 模型</label>
      <select id="model">
        <option value="llama-3.3-70b-versatile">LLaMA 3.3 70B（推薦）</option>
        <option value="llama3-8b-8192">LLaMA 3 8B（最快）</option>
        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
      </select>
    </div>
    <div class="setting">
      <label>語音回覆</label>
      <select id="ttsVoice"><option>載入中...</option></select>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn-toggle" onclick="toggleSys()" id="sysBtn">▸ Agent 角色</button>
    <div class="tts-wrap">
      <input type="checkbox" id="ttsOn" checked>
      <label for="ttsOn">語音朗讀</label>
    </div>
    <button class="btn-clear" onclick="clearChat()">清除對話</button>
  </div>

  <!-- System Prompt -->
  <div class="sys-section" id="sysSec">
    <textarea id="sysPrompt">你是一位智慧語音助理，服務龍巖資訊轉型部團隊。擅長繁體中文與英文雙語溝通，請根據用戶使用的語言回覆。回覆簡潔清楚，適合語音朗讀，不要使用 Markdown 符號或條列符號。</textarea>
  </div>

  <!-- Chat Box -->
  <div class="chat-box" id="chatBox">
    <div class="placeholder" id="ph">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
      設定好 API Key 後，按麥克風說話或輸入文字
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()" aria-label="語音輸入">
      <svg id="micSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <div class="text-row">
      <input type="text" class="text-input" id="txtIn" placeholder="輸入文字..." onkeydown="if(event.key==='Enter')sendText()">
      <button class="send-btn" onclick="sendText()">送出</button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="dot" id="sDot"></div>
    <span id="sTxt">請設定 Groq API Key</span>
    <span style="margin-left:auto" id="cnt"></span>
  </div>

</div>

<div class="stt-warn" id="sttWarn">⚠️ 語音輸入需使用 Chrome 或 Edge 瀏覽器</div>

<div class="footer">
  <p>Powered by <a href="https://console.groq.com" target="_blank">Groq</a> · LLaMA 3 · 龍巖資訊轉型部 AI 工具</p>
</div>

<script>
let apiKey='', history=[], recognition=null, isListening=false, voices=[];
const $=id=>document.getElementById(id);

function setStatus(t,c){$('sTxt').textContent=t;$('sDot').className='dot '+(c||'');}

function saveKey(){
  const k=$('apiKey').value.trim();
  if(k.length>10){
    apiKey=k;
    $('apiStatus').textContent='✓ API Key 已設定，可以開始對話';
    $('apiStatus').className='api-status ok';
    setStatus('就緒','green');
  } else {
    $('apiStatus').textContent='格式不正確，應以 gsk_ 開頭';
    $('apiStatus').className='api-status err';
  }
}

function toggleSys(){
  const s=$('sysSec'),open=s.style.display==='block';
  s.style.display=open?'none':'block';
  $('sysBtn').textContent=(open?'▸':'▾')+' Agent 角色';
}

function clearChat(){
  history=[];
  const b=$('chatBox');
  b.innerHTML='';
  b.appendChild($('ph'));
  $('ph').style.display='';
  $('cnt').textContent='';
}

function iconSvg(type){
  if(type==='bolt') return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;
  return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
}

function addMsg(role,text){
  $('ph').style.display='none';
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'ai');
  const ico=role==='user'?'user':'bolt';
  const clean=text.replace(/[*#`•]/g,'').replace(/\n+/g,' ');
  d.innerHTML=`<div class="msg-icon">${iconSvg(ico)}</div><div class="msg-bubble">${clean}</div>`;
  $('chatBox').appendChild(d);
  $('chatBox').scrollTop=$('chatBox').scrollHeight;
  const t=Math.floor(history.length/2);
  if(t>0)$('cnt').textContent=t+' 則對話';
}

async function sendToGroq(txt){
  if(!apiKey){addMsg('ai','⚠️ 請先設定 Groq API Key');return;}
  history.push({role:'user',content:txt});
  addMsg('user',txt);
  setStatus('思考中...','amber');
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:$('model').value,
        messages:[{role:'system',content:$('sysPrompt').value.trim()},...history],
        max_tokens:600,temperature:0.7
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const reply=data.choices?.[0]?.message?.content||'（無回應）';
    history.push({role:'assistant',content:reply});
    addMsg('ai',reply);
    setStatus('就緒','green');
    if($('ttsOn').checked)speak(reply);
  }catch(e){
    addMsg('ai','⚠️ 錯誤：'+e.message);
    setStatus('錯誤','red');
    history.pop();
  }
}

function sendText(){const i=$('txtIn'),t=i.value.trim();if(!t)return;i.value='';sendToGroq(t);}

function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text.replace(/[*#`•\-]/g,''));
  const sel=voices.find(v=>v.name===$('ttsVoice').value);
  if(sel)utt.voice=sel;
  utt.rate=1.0;
  utt.onend=()=>setStatus('就緒','green');
  setStatus('朗讀中...','green');
  window.speechSynthesis.speak(utt);
}

function populateVoices(){
  if(!window.speechSynthesis)return;
  voices=window.speechSynthesis.getVoices();
  const sel=$('ttsVoice'),prev=sel.value;
  sel.innerHTML='';
  const zh=voices.filter(v=>v.lang.startsWith('zh'));
  const en=voices.filter(v=>v.lang.startsWith('en'));
  const ot=voices.filter(v=>!v.lang.startsWith('zh')&&!v.lang.startsWith('en'));
  const addG=(label,arr)=>{
    if(!arr.length)return;
    const g=document.createElement('optgroup');g.label=label;
    arr.forEach(v=>{const o=document.createElement('option');o.value=v.name;o.textContent=v.name+(v.localService?' ✓':'');g.appendChild(o);});
    sel.appendChild(g);
  };
  addG('中文',zh);addG('English',en);addG('其他',ot);
  if(prev&&[...sel.options].find(o=>o.value===prev))sel.value=prev;
}

function initSTT(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){$('sttWarn').style.display='block';return;}
  recognition=new SR();
  recognition.continuous=false;recognition.interimResults=true;
  recognition.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    $('txtIn').value=t;
    if(e.results[e.results.length-1].isFinal){stopMic();sendToGroq(t);$('txtIn').value='';}
  };
  recognition.onerror=e=>{setStatus('語音錯誤: '+e.error,'red');stopMic();};
  recognition.onend=()=>{if(isListening)stopMic();};
}

function toggleMic(){
  if(isListening){stopMic();return;}
  if(!recognition){initSTT();if(!recognition)return;}
  recognition.lang=$('sttLang').value;
  recognition.start();
  isListening=true;
  $('micBtn').classList.add('listening');
  setStatus('聽講中，不可以講髒話...','red');
}

function stopMic(){
  isListening=false;
  if(recognition)try{recognition.stop();}catch(e){}
  $('micBtn').classList.remove('listening');
  setStatus(apiKey?'就緒':'請設定 API Key',apiKey?'green':'');
}

window.speechSynthesis&&(window.speechSynthesis.onvoiceschanged=populateVoices);
populateVoices();
initSTT();
apiKey='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';
$('apiStatus').textContent='✓ API Key 已設定，可以開始對話';
$('apiStatus').className='api-status ok';
$('apiSection') && ($('apiSection').style.display='none');
setStatus('就緒','green');
</script>
</body>
</html>
